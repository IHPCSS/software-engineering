name: CI

on:
  push:
  pull_request:

# Cancel any in-progress run for the same branch when a new push arrives.
# This avoids wasting runner minutes on stale commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.compiler }} / ${{ matrix.build_type }}
    runs-on: ubuntu-24.04

    strategy:
      # Run all matrix combinations even if one fails, so you see the full
      # picture rather than stopping at the first broken configuration.
      fail-fast: false
      matrix:
        compiler:   [gcc, clang]
        build_type: [Debug, Release]
        include:
          - compiler: gcc
            CC:  gcc-14
            CXX: g++-14
          - compiler: clang
            CC:  clang-18
            CXX: clang++-18

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install compiler
        run: |
          sudo apt-get update -qq
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            sudo apt-get install -y gcc-14 g++-14
          else
            sudo apt-get install -y clang-18
          fi

      - name: Configure
        env:
          CC:  ${{ matrix.CC }}
          CXX: ${{ matrix.CXX }}
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Build test executables
        # Test binaries are EXCLUDE_FROM_ALL, so they must be built explicitly
        # via the 'tests' custom target defined in src/CMakeLists.txt.
        run: cmake --build build --target tests --parallel $(nproc)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure --parallel $(nproc)

  clang-analyzer:
    name: clang static analyzer
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install clang-18 and scan-build Python tool
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang-18
          pip3 install --user scan-build
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Configure (generate compile_commands.json)
        env:
          CC:  clang-18
          CXX: clang++-18
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBUILD_TESTS=ON

      - name: Run clang static analyzer
        # analyze-build replays every command in compile_commands.json with
        # the Clang Static Analyzer, then exits non-zero if any bugs were found.
        # We exclude vendored GoogleTest code and point the tool at the
        # versioned clang-18 binary so it doesn't fall back to a missing 'clang'.
        run: |
          analyze-build \
            --cdb build/compile_commands.json \
            --status-bugs \
            --exclude src/external \
            --use-analyzer /usr/bin/clang-18

  cppcheck:
    name: cppcheck
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install cppcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          find src -name "*.cpp" -not -path "*/external/*" -not -path "*/tests/*" | \
            xargs cppcheck \
              --std=c++23 \
              --enable=warning,style,performance,portability \
              --suppress=missingIncludeSystem \
              --error-exitcode=1 \
              -I src

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install clang and clang-tidy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang-18 clang-tidy-18

      - name: Configure (generate compile_commands.json)
        env:
          CC:  clang-18
          CXX: clang++-18
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBUILD_TESTS=ON

      - name: Run clang-tidy
        run: |
          find src -name "*.cpp" -not -path "*/external/*" | sort | \
            xargs clang-tidy-18 -p build

  asan:
    name: AddressSanitizer
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install clang-18
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang-18

      - name: Configure
        env:
          CC:  clang-18
          CXX: clang++-18
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTS=ON \
            -DSANITIZE=address

      - name: Build test executables
        run: cmake --build build --target tests --parallel $(nproc)

      - name: Run tests under ASan
        env:
          ASAN_OPTIONS: abort_on_error=1:detect_leaks=1
        run: ctest --test-dir build --output-on-failure --parallel $(nproc)

  msan:
    name: MemorySanitizer
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install clang-18
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang-18

      - name: Configure
        env:
          CC:  clang-18
          CXX: clang++-18
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTS=ON \
            -DSANITIZE=memory

      - name: Build test executables
        run: cmake --build build --target tests --parallel $(nproc)

      - name: Run tests under MSan
        # MSan requires all linked code to be instrumented. The system libstdc++
        # shipped with ubuntu-24.04 is NOT instrumented, causing false positives
        # during GoogleTest's static initialisation (BoolFromGTestEnv →
        # FlagToEnvVar → std::string ops whose shadow memory was never filled in
        # by the uninstrumented libstdc++ constructor).
        # msan_suppressions.txt silences that specific false-positive call chain
        # while leaving all instrumentation of our own library code intact.
        env:
          MSAN_OPTIONS: abort_on_error=1:suppressions=${{ github.workspace }}/msan_suppressions.txt
        run: ctest --test-dir build --output-on-failure --parallel $(nproc)

  tsan:
    name: ThreadSanitizer
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install clang-18
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang-18

      - name: Configure
        env:
          CC:  clang-18
          CXX: clang++-18
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTS=ON \
            -DSANITIZE=thread

      - name: Build test executables
        run: cmake --build build --target tests --parallel $(nproc)

      - name: Run tests under TSan
        env:
          TSAN_OPTIONS: abort_on_error=1
        run: ctest --test-dir build --output-on-failure --parallel $(nproc)

  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    # Only measure coverage once the full matrix is green.
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install GCC and lcov
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-14 g++-14 lcov

      - name: Configure (Debug + coverage instrumentation)
        env:
          CC:  gcc-14
          CXX: g++-14
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTS=ON \
            -DBUILD_COVERAGE=ON

      - name: Build test executables
        run: cmake --build build --target tests --parallel $(nproc)

      - name: Run tests and collect coverage data
        # The 'coverage' target: runs ctest, runs lcov, renders HTML report.
        # coverage.info is the file we upload to Codecov.
        run: cmake --build build --target coverage

      - name: Upload coverage report to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: build/coverage.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
