name: CI

on:
  push:
  pull_request:

# Cancel any in-progress run for the same branch when a new push arrives.
# This avoids wasting runner minutes on stale commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.compiler }} / ${{ matrix.build_type }}
    runs-on: ubuntu-24.04

    strategy:
      # Run all matrix combinations even if one fails, so you see the full
      # picture rather than stopping at the first broken configuration.
      fail-fast: false
      matrix:
        compiler:   [gcc, clang]
        build_type: [Debug, Release]
        include:
          - compiler: gcc
            CC:  gcc-14
            CXX: g++-14
          - compiler: clang
            CC:  clang-18
            CXX: clang++-18

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install compiler
        run: |
          sudo apt-get update -qq
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            sudo apt-get install -y gcc-14 g++-14
          else
            sudo apt-get install -y clang-18
          fi

      - name: Configure
        env:
          CC:  ${{ matrix.CC }}
          CXX: ${{ matrix.CXX }}
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Build test executables
        # Test binaries are EXCLUDE_FROM_ALL, so they must be built explicitly
        # via the 'tests' custom target defined in src/CMakeLists.txt.
        run: cmake --build build --target tests --parallel $(nproc)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure --parallel $(nproc)

  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    # Only measure coverage once the full matrix is green.
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install GCC and lcov
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-14 g++-14 lcov

      - name: Configure (Debug + coverage instrumentation)
        env:
          CC:  gcc-14
          CXX: g++-14
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTS=ON \
            -DBUILD_COVERAGE=ON

      - name: Build test executables
        run: cmake --build build --target tests --parallel $(nproc)

      - name: Run tests and collect coverage data
        # The 'coverage' target: runs ctest, runs lcov, renders HTML report.
        # coverage.info is the file we upload to Codecov.
        run: cmake --build build --target coverage

      - name: Upload coverage report to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: build/coverage.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
